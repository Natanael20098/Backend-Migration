services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chiron
      POSTGRES_PASSWORD: chiron
      POSTGRES_DB: chiron
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chiron -d chiron"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Chiron Backend
      APP_VERSION: "0.1.0"
      DEBUG: "true"
      DATABASE_URL: postgresql://chiron:chiron@db:5432/chiron
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
